name: uptodo
description: "UpTodo - A modern task management app with premium UI."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  uuid: ^4.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  file_picker: ^8.0.0
  share_plus: ^9.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/
